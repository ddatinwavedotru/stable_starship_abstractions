# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - coverage.svg
  pull_request:
    branches: [ "main", "master" ]
    paths-ignore:
      - coverage.svg

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-latest]
        build_type: [Release]
        c_compiler: [gcc]
        # os: [ubuntu-latest, windows-latest]
        # build_type: [Release]
        # c_compiler: [gcc, clang, cl]
        include:
          # - os: windows-latest
          #   c_compiler: cl
          #   cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          # - os: ubuntu-latest
          #   c_compiler: clang
          #   cpp_compiler: clang++
        exclude:
          # - os: windows-latest
          #   c_compiler: gcc
          # - os: windows-latest
          #   c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --build-config ${{ matrix.build_type }}

  coverage:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref_name }}

    - name: Install gcovr
      run: |
        sudo apt-get update
        sudo apt-get install -y gcovr

    - name: Configure CMake with coverage
      run: >
        cmake -B build
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Debug
        -DENABLE_COVERAGE=ON
        -S .

    - name: Build with coverage
      run: cmake --build build

    - name: Run tests with coverage
      working-directory: ./build
      run: |
        ./tests/runTests || true
        # Используем gcovr для генерации отчета
        gcovr -r .. --filter ../src/ --exclude ../tests/ --exclude ../extern/ --html --html-details -o coverage_report.html
        # Генерируем XML-отчет, из которого будет строиться локальный badge
        gcovr -r .. --filter ../src/ --exclude ../tests/ --exclude ../extern/ --xml > coverage.xml
        # Показываем сводку покрытия
        gcovr -r .. --filter ../src/ --exclude ../tests/ --exclude ../extern/

    - name: Generate local coverage badge
      run: |
        python3 - <<'PY'
        import xml.etree.ElementTree as ET
        from pathlib import Path

        root = ET.parse("build/coverage.xml").getroot()
        line_rate = float(root.attrib.get("line-rate", "0"))
        percent = round(line_rate * 100, 1)

        if percent >= 90:
            color = "#4c1"
        elif percent >= 75:
            color = "#97CA00"
        elif percent >= 60:
            color = "#dfb317"
        else:
            color = "#e05d44"

        label = "coverage"
        value = f"{percent:.1f}%"
        left_width = 74
        right_width = max(52, 10 * len(value) + 12)
        total_width = left_width + right_width
        left_text_x = left_width / 2
        right_text_x = left_width + right_width / 2

        svg = f"""<svg xmlns="http://www.w3.org/2000/svg" width="{total_width}" height="20" role="img" aria-label="{label}: {value}">
        <linearGradient id="s" x2="0" y2="100%">
        <stop offset="0" stop-color="#fff" stop-opacity=".7"/>
        <stop offset=".1" stop-color="#aaa" stop-opacity=".1"/>
        <stop offset=".9" stop-color="#000" stop-opacity=".3"/>
        <stop offset="1" stop-color="#000" stop-opacity=".5"/>
        </linearGradient>
        <clipPath id="r">
        <rect width="{total_width}" height="20" rx="3" fill="#fff"/>
        </clipPath>
        <g clip-path="url(#r)">
        <rect width="{left_width}" height="20" fill="#555"/>
        <rect x="{left_width}" width="{right_width}" height="20" fill="{color}"/>
        <rect width="{total_width}" height="20" fill="url(#s)"/>
        </g>
        <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
        <text x="{left_text_x}" y="15" fill="#010101" fill-opacity=".3">{label}</text>
        <text x="{left_text_x}" y="14">{label}</text>
        <text x="{right_text_x}" y="15" fill="#010101" fill-opacity=".3">{value}</text>
        <text x="{right_text_x}" y="14">{value}</text>
        </g>
        </svg>
        """

        Path("coverage.svg").write_text(svg, encoding="utf-8")
        print(f"Coverage badge updated: {value}")
        PY

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          build/coverage_report.html
          build/coverage.xml
        retention-days: 30

    - name: Commit coverage badge
      if: github.event_name == 'push'
      run: |
        if git diff --quiet -- coverage.svg; then
          echo "coverage.svg is up to date"
          exit 0
        fi
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add coverage.svg
        git commit -m "Update coverage badge [skip ci]"
        git push origin HEAD:${{ github.ref_name }}
